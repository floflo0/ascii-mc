name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - dev

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: latest
          cache: npm
          cache-dependency-path: ./wasm/package-lock.json

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y clang binaryen make gcc-multilib

      - name: Build wasm
        run: make wasm BUILD_TYPE=release

      - name: Install NPM dependencies
        working-directory: wasm
        run: npm ci

      - name: Build vite
        working-directory: wasm
        run: npm run build

      - name: Run linter
        run: npm run lint-check
        working-directory: wasm
